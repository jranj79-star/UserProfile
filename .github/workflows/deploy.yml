name: CI/CD - Streamlit Docker Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/userprofile-streamlit
          echo "image_name=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:latest
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.sha_tag }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/userprofile-streamlit"
            IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')

            docker pull "$IMAGE_NAME:latest"

            docker stop streamlit-app || true
            docker rm streamlit-app || true

            docker run -d \
              --name streamlit-app \
              --restart always \
              -p 8501:8501 \
              "$IMAGE_NAME:latest"

            docker image prune -f

      - name: Health check
        run: |
          APP_URL="http://${{ secrets.SERVER_HOST }}:8501"
          echo "Checking app at $APP_URL"

          for i in {1..12}; do
            if curl -fsS "$APP_URL" > /dev/null; then
              echo "Health check passed on attempt $i"
              exit 0
            fi

            echo "Attempt $i/12 failed, retrying in 10 seconds..."
            sleep 10
          done

          echo "Health check failed after 12 attempts"
          exit 1
