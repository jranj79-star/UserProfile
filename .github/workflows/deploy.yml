name: CI/CD - Streamlit Docker Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/userprofile-streamlit
          echo "image_name=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          IMAGE_NAME="${{ steps.meta.outputs.image_name }}"
          SHA_TAG="${{ steps.meta.outputs.sha_tag }}"

          docker build -f Dockerfile -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$SHA_TAG" .
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:$SHA_TAG"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    # Secrets must be stored in the GitHub environment named "production".
    environment: production

    steps:
      - name: Debug secrets
        run: |
          if [ -n "${{ secrets.SERVER_HOST }}" ]; then echo "SERVER_HOST is set"; else echo "SERVER_HOST is missing"; fi
          if [ -n "${{ secrets.SERVER_USER }}" ]; then echo "SERVER_USER is set"; else echo "SERVER_USER is missing"; fi
          if [ -n "${{ secrets.SERVER_SSH_KEY }}" ]; then echo "SERVER_SSH_KEY is set"; else echo "SERVER_SSH_KEY is missing"; fi
          if [ -n "${{ secrets.SERVER_PORT }}" ]; then echo "SERVER_PORT is set"; else echo "SERVER_PORT is missing"; fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/userprofile-streamlit"
            IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')

            docker pull "$IMAGE_NAME:latest"

            docker stop streamlit-app || true
            docker rm streamlit-app || true

            docker run -d \
              --name streamlit-app \
              --restart always \
              -p 8501:8501 \
              "$IMAGE_NAME:latest"

            docker image prune -f

      - name: Health check
        run: |
          APP_URL="http://${{ secrets.SERVER_HOST }}:8501"
          echo "Checking app at $APP_URL"

          for i in {1..12}; do
            if curl -fsS "$APP_URL" > /dev/null; then
              echo "Health check passed on attempt $i"
              exit 0
            fi

            echo "Attempt $i/12 failed, retrying in 10 seconds..."
            sleep 10
          done

          echo "Health check failed after 12 attempts"
          exit 1
